services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - WORKSPACE_BASE=/app/workspace
    volumes:
      - ${WORKSPACE_PATH:-./workspace}:/app/workspace
      - ${LIBS_PATH:-./backend/libs}:/app/libs
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/topic-lab/}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
